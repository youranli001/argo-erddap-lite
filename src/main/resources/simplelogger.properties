# SLF4J Simple logger config — controls log format for both Javalin and NetCDF-Java.
org.slf4j.simpleLogger.defaultLogLevel=info
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss
org.slf4j.simpleLogger.showShortLogName=true

# NetCDF-Java is chatty at INFO. Turn it down a bit unless we are debugging.
org.slf4j.simpleLogger.log.ucar=warn
